    Binding:
      $ref: "./schemas/binding.yaml#/Binding"
    AdminStats:
      $ref: "./schemas/admin.yaml#/AdminStats"

  responses:
    UnauthorizedError:
      $ref: "./schemas/common.yaml#/UnauthorizedError"
    ForbiddenError:
      $ref: "./schemas/common.yaml#/ForbiddenError"
    NotFoundError:
      $ref: "./schemas/common.yaml#/NotFoundError"
