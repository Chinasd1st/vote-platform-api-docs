    PollOption:
      $ref: "./schemas/poll.yaml#/PollOption"
    PostSummary:
      $ref: "./schemas/post.yaml#/PostSummary"
    Comment:
      $ref: "./schemas/comment.yaml#/Comment"
    Notification:
