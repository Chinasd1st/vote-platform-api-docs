openapi: 3.1.0

info:
  title: 恶俗投票平台 API
  description: |
    在线投票与社区动态平台 API 文档。

    **认证方式**：Bearer Token (JWT)
    **基础 URL**：https://votehub.silentnrtx.top/api

    ## 认证流程

    1. 调用 `POST /auth/login` 获取 session
    2. 或通过 NextAuth GitHub OAuth 登录
    3. 请求头携带 `Authorization: Bearer <token>`

    ## 响应格式

    - 成功：`{ data: T, pagination?: Pagination }`
    - 错误：`{ error: string }`
  version: "1.0.0"
  contact:
    name: Silentnrtx
    url: https://github.com/Chinasd1st
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://votehub.silentnrtx.top/api
    description: 生产环境
  - url: http://localhost:3000/api
    description: 本地开发

security: []

