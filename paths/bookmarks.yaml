/bookmarks:
  get:
    tags: [Bookmarks]
    summary: 获取收藏列表
    operationId: getBookmarks
    security:
      - BearerAuth: []
    description: |
      返回当前用户的收藏列表。

      **返回内容：**
      - 收藏的投票列表
      - 包含投票基本信息（标题、描述、状态、票数）
      - 收藏时间

      **分页：**
      - 默认每页 20 条，最大 50 条
      - 按收藏时间倒序排列

      **排序：**
      - `time` - 按收藏时间倒序（默认）
      - `polls` - 按投票热度排序
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
        description: 页码
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          maximum: 50
        description: 每页数量
      - name: sort
        in: query
        schema:
          type: string
          enum: [time, polls]
          default: time
        description: 排序方式
    responses:
      "200":
        description: 成功返回收藏列表
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    allOf:
                      - $ref: "../openapi.yaml#/components/schemas/PollSummary"
                      - type: object
                        properties:
                          bookmarkedAt:
                            type: integer
                            description: 收藏时间戳
                pagination:
                  $ref: "../openapi.yaml#/components/schemas/Pagination"
      "401":
        $ref: "../openapi.yaml#/components/responses/UnauthorizedError"
