/polls/{id}/clone:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: 要克隆的投票 ID
  post:
    tags: [Polls]
    summary: 克隆投票为草稿
    operationId: clonePoll
    security:
      - BearerAuth: []
    description: |
      复制投票的所有信息，创建一个新的草稿投票。

      **复制内容：**
      - 标题（添加"（副本）"后缀）
      - 描述
      - 主题
      - 所有选项（选项文本）

      **不复制的内容：**
      - 投票记录
      - 评论
      - 置顶状态
      - 算法设置

      **新投票属性：**
      - 状态：`draft`
      - 作者：当前用户
      - 开始/结束时间：不设置
    responses:
      "201":
        description: 克隆成功，返回新投票 ID
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                  description: 新创建的草稿投票 ID
      "401":
        $ref: "../openapi.yaml#/components/responses/UnauthorizedError"

/polls/{id}/export:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: 要导出的投票 ID
  get:
    tags: [Polls]
    summary: 导出投票为 CSV
    operationId: exportPoll
    description: |
      导出投票数据为 CSV 文件。

      **导出格式（按投票类型）：**

      | 类型 | 格式 |
      |------|------|
      | 单选/多选 | `选项, 票数, 投票者列表` |
      | 排序投票 | `投票者 x 选项矩阵（排名值）` |
      | 加权投票 | `投票者 x 选项矩阵（权重值）` |
      | 批准投票 | `投票者 x 选项矩阵（1/0/-1）` |

      **文件命名：**
      - 格式：`投票标题-投票ID.csv`
      - 编码：UTF-8 with BOM
    responses:
      "200":
        description: CSV 文件下载
        content:
          text/csv:
            schema:
              type: string
              format: binary
              description: CSV 文件内容
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFoundError"

/polls/{id}/share:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: 要分享的投票 ID
  post:
    tags: [Polls]
    summary: 分享投票（计数+1）
    operationId: sharePoll
    security:
      - BearerAuth: []
    description: |
      增加投票的分享计数。

      **使用场景：**
      - 用户点击分享按钮时调用
      - 用于统计投票的分享次数
      - 不限制调用频率

      **返回值：**
      返回最新的分享计数。
    responses:
      "200":
        description: 分享计数更新成功
        content:
          application/json:
            schema:
              type: object
              properties:
                ok:
                  type: boolean
                  example: true
                shareCount:
                  type: integer
                  description: 最新的分享计数

/polls/{id}/bookmark:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: 要收藏的投票 ID
  post:
    tags: [Polls]
    summary: 收藏投票
    operationId: bookmarkPoll
    security:
      - BearerAuth: []
    description: |
      将投票添加到当前用户的收藏列表。

      **行为：**
      - 不可重复收藏
      - 更新投票的收藏计数
      - 通知投票作者（可选）

      **使用场景：**
      - 用户点击收藏按钮
      - 用于保存感兴趣的投票以便后续查看
    responses:
      "200":
        description: 收藏成功
        content:
          application/json:
            schema:
              type: object
              properties:
                ok:
                  type: boolean
                  example: true
                bookmarked:
                  type: boolean
                  example: true
                  description: 当前收藏状态
      "400":
        description: 已经收藏过了
      "401":
        $ref: "../openapi.yaml#/components/responses/UnauthorizedError"
  delete:
    tags: [Polls]
    summary: 取消收藏
    operationId: unbookmarkPoll
    security:
      - BearerAuth: []
    description: |
      从当前用户的收藏列表中移除投票。

      **行为：**
      - 更新投票的收藏计数
      - 不会删除其他用户的通知
    responses:
      "200":
        description: 取消收藏成功
        content:
          application/json:
            schema:
              type: object
              properties:
                ok:
                  type: boolean
                  example: true
                bookmarked:
                  type: boolean
                  example: false
                  description: 当前收藏状态
      "401":
        $ref: "../openapi.yaml#/components/responses/UnauthorizedError"
