/auth/login:
  post:
    tags: [Auth]
    summary: 邮箱密码登录
    operationId: login
    description: |
      使用邮箱和密码进行登录。

      **认证流程：**
      1. 调用此接口获取登录状态
      2. 浏览器会自动保存 JWT session cookie
      3. 后续请求携带 cookie 即可

      **错误码说明：**
      - `400` - 邮箱或密码错误
      - `429` - 登录尝试过于频繁（每分钟 5 次）
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email, password]
            properties:
              email:
                type: string
                format: email
                description: 注册时使用的邮箱
                example: "user@vote.com"
              password:
                type: string
                description: 账号密码
                example: "admin123"
    responses:
      "200":
        description: 登录成功，浏览器自动保存 session cookie
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
      "400":
        description: 邮箱或密码错误
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/ErrorResponse"
      "429":
        description: 登录尝试过于频繁
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/ErrorResponse"

/users:
  post:
    tags: [Auth]
    summary: 注册新用户
    operationId: register
    description: |
      注册新的用户账号。

      **注册规则：**
      - 昵称：2-20 个字符，不能包含 `<>"'&`
      - 邮箱：必须是有效邮箱格式，且未被注册
      - 密码：至少 8 位，必须包含小写字母和数字

      **频率限制：**
      - 无验证码：每分钟最多 2 次
      - 有验证码：每分钟最多 20 次

      **注册后流程：**
      注册成功后需要手动登录，接口不会自动登录。
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, email, password]
            properties:
              name:
                type: string
                minLength: 2
                maxLength: 20
                description: 用户昵称（2-20 字符）
                example: "新用户"
              email:
                type: string
                format: email
                description: 登录邮箱（唯一）
                example: "new@vote.com"
              password:
                type: string
                minLength: 8
                description: "密码至少 8 位，需包含小写字母和数字"
                example: "pass1234"
              captchaToken:
                type: string
                description: |
                  Cloudflare Turnstile 验证 token（可选但强烈推荐）。
                  无 token 时频率限制更严格。
    responses:
      "201":
        description: 注册成功
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
      "400":
        description: |
          参数错误：
          - 邮箱已被注册
          - 昵称已被使用
          - 密码不符合要求
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/ErrorResponse"
      "429":
        description: 请求过于频繁，请稍后再试
        content:
          application/json:
            schema:
              $ref: "../openapi.yaml#/components/schemas/ErrorResponse"
