/notifications:
  get:
    tags: [Notifications]
    summary: 获取通知列表
    operationId: getNotifications
    security:
      - BearerAuth: []
    description: |
      返回当前用户的通知列表。

      **通知类型：**
      - `vote_created` - 关注的用户创建了新投票
      - `vote_commented` - 投票收到新评论
      - `post_liked` - 推文被点赞
      - `post_commented` - 推文收到新评论
      - `user_followed` - 有新粉丝
      - `poll_ended` - 参与的投票已结束

      **自动清理：**
      - 30 天前的通知会被自动删除

      **分页：**
      - 默认每页 20 条
      - 按创建时间倒序
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
        description: 页码
    responses:
      "200":
        description: 成功返回通知列表
        content:
          application/json:
            schema:
              type: object
              properties:
                notifications:
                  type: array
                  items:
                    $ref: "../openapi.yaml#/components/schemas/Notification"
                  description: 通知列表
                unreadCount:
                  type: integer
                  description: 未读通知数量
                pagination:
                  type: object
                  properties:
                    page:
                      type: integer
                      description: 当前页码
                    totalPages:
                      type: integer
                      description: 总页数
                    total:
                      type: integer
                      description: 总通知数
      "401":
        $ref: "../openapi.yaml#/components/responses/UnauthorizedError"

  put:
    tags: [Notifications]
    summary: 标记通知已读
    operationId: markNotificationsRead
    security:
      - BearerAuth: []
    description: |
      标记通知为已读状态。

      **选项：**
      - `markAll: true` - 标记所有通知为已读（默认）
      - `markAll: false` - 不做任何操作

      **行为：**
      - 更新通知的 `isRead` 状态
      - 减少未读计数
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              markAll:
                type: boolean
                default: true
                description: 是否标记所有通知为已读
    responses:
      "200":
        description: 标记成功
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
      "401":
        $ref: "../openapi.yaml#/components/responses/UnauthorizedError"
